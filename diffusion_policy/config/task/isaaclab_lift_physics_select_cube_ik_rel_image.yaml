name: isaaclab_lift_physics_select_cube_ik_rel_image

image_shape: &image_shape [3, 240, 320]
state_dim: 36
action_dim: 7

shape_meta: &shape_meta
  obs:
    image:
      shape: *image_shape
      type: rgb
    state:
      shape: [36]
      type: low_dim
  action:
    shape: [7]

dataset_path: &dataset_path data/isaaclab/success_constant_all_datasets_20ep.hdf5
rgb_root: &rgb_root data/isaaclab/Images
obs_group: &obs_group teleop_obs
action_key: &action_key actions
obs_keys: &obs_keys [
  ee_pose_in_robot_frame,
  joint_pos,
  joint_vel,
  object_position,
  target_object_position,
  gripper_object_contact
]

env_runner:
  _target_: diffusion_policy.env_runner.null_image_runner.NullImageRunner

dataset:
  _target_: diffusion_policy.dataset.isaaclab_image_dataset.IsaacLabImageDataset
  dataset_path: *dataset_path
  rgb_root: *rgb_root
  image_shape: *image_shape
  obs_group: *obs_group
  action_key: *action_key
  obs_keys: *obs_keys
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1+${n_latency_steps}'}
  pad_after: ${eval:'${n_action_steps}-1'}
  n_obs_steps: ${dataset_obs_steps}
  seed: 42
  val_ratio: 0.1
  max_train_episodes: null
